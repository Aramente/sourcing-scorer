name = "sourcing-scorer"
main = "src/index.js"
compatibility_date = "2024-11-01"
workers_dev = true

[assets]
directory = "./public"
binding = "ASSETS"
# Without this, Cloudflare serves static assets (including index.html at "/")
# directly and never invokes fetch() below — meaning the session/login gate
# in this file never actually runs for "/". That's the real root cause of the
# reload loop: an expired session got 401s from /api/* (Worker-handled) while
# "/" kept serving the full SPA regardless of auth (asset-handled, bypassing
# the session check entirely), so it reloaded and repeated forever.
run_worker_first = true

[[d1_databases]]
binding = "DB"
database_name = "sourcing-scorer"
database_id = "e0a654e3-eef5-412d-826e-449618e3aeb3"

[ai]
binding = "AI"

# Uncomment once sloow.app is added as a Cloudflare zone in your account:
# [[routes]]
# pattern = "sourcing-scorer.sloow.app"
# custom_domain = true

[vars]
USER1_ID = "kevin"
USER1_NAME = "Kevin"
USER2_ID = "user2"
USER2_NAME = "User 2"
USER3_ID = "user3"
USER3_NAME = "User 3"
USER4_ID = "user4"
USER4_NAME = "User 4"
